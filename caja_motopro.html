<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingresos Moto Pro · Caja</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#F7F6F2;--surface:#FFFFFF;--ink:#19170F;--ink-soft:#5C574B;--line:#E4E0D6;
    --amber:#E0701B;--amber-soft:#FBEEDF;--green:#1B7A4B;--green-soft:#E5F1EA;
    --red:#BE3A34;--red-soft:#F8E7E5;--blue:#2C5C8A;--blue-soft:#E7EFF6;--gray-soft:#F0EEE8;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:ui-sans-serif,-apple-system,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45;-webkit-font-smoothing:antialiased;padding-bottom:96px}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  .wrap{max-width:560px;margin:0 auto;padding:0 16px}
  header{background:var(--ink);color:#fff;padding:18px 0 16px}
  header .wrap{display:flex;align-items:center;gap:12px}
  .link-pol{margin-left:auto;text-decoration:none;background:var(--blue-soft);color:var(--blue);font-size:13px;font-weight:700;padding:9px 14px;border-radius:10px;white-space:nowrap}
  .logo{width:38px;height:38px;border-radius:9px;background:var(--amber);display:grid;place-items:center;flex:0 0 auto;font-weight:800;font-size:18px;color:#19170F;letter-spacing:-1px}
  header h1{font-size:18px;font-weight:700;letter-spacing:-.2px;line-height:1.1}
  header .sub{font-size:12px;color:#B8B2A4;font-weight:500;margin-top:1px}

  section{margin-top:18px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px}
  .eyebrow{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--amber);margin-bottom:10px;display:flex;align-items:center;gap:7px}
  .eyebrow .n{background:var(--amber);color:#19170F;width:18px;height:18px;border-radius:5px;display:grid;place-items:center;font-size:11px}

  .drop{display:block;border:2px dashed var(--line);border-radius:12px;padding:26px 16px;text-align:center;cursor:pointer;transition:.15s;background:#FCFBF8}
  .drop:hover,.drop:focus-visible{border-color:var(--amber);background:var(--amber-soft);outline:none}
  .drop .ic{font-size:30px;line-height:1}
  .drop b{display:block;margin-top:8px;font-size:15px}
  .drop small{color:var(--ink-soft);font-size:12.5px}
  input[type=file]{position:absolute;width:1px;height:1px;opacity:0;overflow:hidden}

  .lista-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
  .lista-head .t{font-size:15px;font-weight:700}
  .lista-head .s{font-size:12.5px;color:var(--ink-soft)}

  .corte{border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden;background:#fff}
  .corte.tiene-tarjeta{border-left:3px solid var(--amber)}
  .crow{display:flex;align-items:center;gap:11px;padding:13px 14px;cursor:pointer}
  .crow:hover{background:#FCFBF8}
  .cmid{flex:1;min-width:0}
  .cmid .l1{font-weight:700;font-size:14px}
  .cmid .l2{font-size:11.5px;color:var(--ink-soft)}
  .ctot{text-align:right;flex:0 0 auto}
  .ctot .t{font-weight:700;font-size:15px}
  .vbadge{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:20px;display:inline-block;margin-top:2px}
  .vbadge.pend{background:var(--amber-soft);color:var(--amber)}
  .vbadge.done{background:var(--green-soft);color:var(--green)}
  .vbadge.none{background:var(--gray-soft);color:var(--ink-soft)}
  .chev{flex:0 0 auto;color:var(--ink-soft);font-size:13px;width:13px}

  .cdet{border-top:1px solid var(--line);padding:10px 14px;background:#FCFBF8;display:none}
  .cdet.open{display:block}
  .venta{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--line)}
  .venta:last-child{border-bottom:none}
  .tag{flex:0 0 auto;width:38px;height:38px;border-radius:8px;display:grid;place-items:center;font-size:11px;font-weight:800}
  .tag.tc{background:var(--amber-soft);color:var(--amber)}
  .tag.td{background:var(--blue-soft);color:var(--blue)}
  .venta .info{flex:1;min-width:0}
  .venta .monto{font-weight:700;font-size:15px}
  .venta .meta{font-size:11.5px;color:var(--ink-soft)}
  .vbtn{flex:0 0 auto;border:1.5px solid var(--amber);color:var(--amber);background:#fff;font-weight:700;font-size:12px;padding:7px 10px;border-radius:8px;cursor:pointer;white-space:nowrap}
  .thumb{flex:0 0 auto;width:38px;height:38px;border-radius:8px;object-fit:cover;border:1px solid var(--line)}
  .breakdown{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
  .chip{font-size:11px;font-weight:600;padding:3px 8px;border-radius:7px;background:var(--gray-soft);color:var(--ink-soft)}
  .chip.td{background:var(--blue-soft);color:var(--blue)}
  .chip.tc{background:var(--amber-soft);color:var(--amber)}
  .chip.ef{background:var(--green-soft);color:var(--green)}
  .empty{font-size:12.5px;color:var(--ink-soft);padding:6px 0}

  .field{margin-bottom:11px}
  .field input{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 12px;font-size:15px;font-family:inherit;background:#FCFBF8;color:var(--ink)}
  .field input:focus{outline:2px solid var(--amber);border-color:transparent;background:#fff}

  .savebar{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:12px 0;z-index:20}
  .savebar .wrap{display:flex;align-items:center;gap:12px}
  .savebtn{flex:1;background:var(--amber);color:#19170F;border:none;border-radius:11px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;transition:.15s}
  .savebtn:disabled{opacity:.55;cursor:not-allowed}
  .savebtn.ok{background:var(--green);color:#fff}

  .config{background:var(--red-soft);color:var(--red);border-radius:10px;padding:10px 12px;font-size:12.5px;font-weight:600;margin-top:18px}
  .fact-ok{background:var(--green-soft);color:var(--green);border-radius:11px;padding:13px 14px;font-size:13.5px;font-weight:700}
  .fact-bad{background:var(--red-soft);color:var(--red);border-radius:11px;padding:13px 14px;font-size:15px;font-weight:800}
  .fact-lista{margin-top:8px;border:1px solid var(--line);border-radius:11px;overflow:hidden}
  .fact-item{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:11px 13px;font-size:13.5px;border-bottom:1px solid var(--line);background:#fff}
  .fact-item:last-child{border-bottom:none}
  .fact-item b{color:var(--red)}
  .cotejo{margin-top:12px;padding-top:12px;border-top:1px dashed var(--line)}
  .cot-head{font-size:12px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
  .cot-count{font-size:13px;color:var(--ink-soft);margin-bottom:8px}
  .cot-count b{color:var(--ink)}
  .cot-ok{background:var(--green-soft);color:var(--green);border-radius:9px;padding:9px 11px;font-size:12.5px;font-weight:700;margin-bottom:8px}
  .cot-bad{background:var(--red-soft);color:var(--red);border-radius:9px;padding:9px 11px;font-size:12.5px;font-weight:700;margin-bottom:8px}
  .cot-wait{background:var(--gray-soft);color:var(--ink-soft);border-radius:9px;padding:9px 11px;font-size:12.5px;font-weight:600;margin-bottom:8px}
  .extra-item{display:flex;align-items:center;gap:10px;padding:7px 0;font-size:12.5px;color:var(--ink-soft)}
  .extra-item span{flex:1}
  .extra-item .x{border:none;background:var(--red-soft);color:var(--red);width:24px;height:24px;border-radius:6px;cursor:pointer;font-weight:700}
  .cot-add{margin-top:4px}
  .deposito{margin-top:12px;padding-top:12px;border-top:1px dashed var(--line)}
  .dep-head{font-size:12px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}
  .dep-line{display:flex;justify-content:space-between;font-size:13px;color:var(--ink-soft);margin-bottom:10px}
  .dep-line b{color:var(--ink)}
  .dep-fields{display:grid;grid-template-columns:1fr 1.3fr;gap:10px;margin-bottom:10px}
  .dep-fields label{font-size:11.5px;font-weight:600;color:var(--ink-soft)}
  .dep-inp{display:flex;align-items:center;gap:4px;border:1px solid var(--line);border-radius:9px;background:#FCFBF8;margin-top:4px;padding:0 9px}
  .dep-inp input{width:100%;border:none;background:none;padding:9px 0;font-size:14px;font-family:inherit;color:var(--ink);outline:none}
  .dep-inp span{color:var(--ink-soft);font-size:13px}
  .dep-result{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .dep-dep,.dep-exc{border-radius:10px;padding:10px 12px}
  .dep-dep{background:var(--green-soft)}
  .dep-exc{background:var(--amber-soft)}
  .dep-dep span,.dep-exc span{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px}
  .dep-dep span{color:var(--green)} .dep-dep b{color:var(--green);font-size:17px}
  .dep-exc span{color:var(--amber)} .dep-exc b{color:var(--amber);font-size:17px}
  .ficha{margin-top:12px;padding-top:12px;border-top:1px dashed var(--line)}
  .ficha-ok{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--green);font-weight:600}
  .ficha-ok span{flex:1}
  .ficha-ok .x{border:none;background:var(--red-soft);color:var(--red);width:24px;height:24px;border-radius:6px;cursor:pointer;font-weight:700}
  .pend-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .pend-sub{font-size:11.5px;color:var(--ink-soft);margin-top:2px}
  .btn-sec{border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 14px;font-size:13px;font-weight:600;font-family:inherit;color:var(--ink);cursor:pointer}
  .pend-item{display:flex;align-items:center;gap:10px;padding:11px 0;border-top:1px solid var(--line);font-size:13.5px}
  .pend-item:first-child{margin-top:10px}
  .pend-item .pi-info{flex:1}
  .pend-item .pi-info b{display:block}
  .pend-item .pi-info span{font-size:11.5px;color:var(--ink-soft)}
  .pend-item .pi-btn{border:none;background:var(--blue-soft);color:var(--blue);border-radius:8px;padding:8px 12px;font-size:12.5px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap}
  .pend-empty{font-size:12.5px;color:var(--ink-soft);margin-top:10px}
  .footnote{font-size:11.5px;color:var(--ink-soft);text-align:center;margin-top:18px;line-height:1.5}
  .hidden{display:none}
  .dep-efdet{background:#EAF4EE;border-radius:9px;padding:9px 11px;margin:8px 0;font-size:12px;color:#1B5E3A}
  .dep-efdet ul{margin:5px 0 0;padding-left:16px}
  .dep-efdet li{margin:2px 0}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="logo">MP</div>
    <div>
      <h1>Ingresos Moto Pro</h1>
      <div class="sub">Caja · corte del día y vouchers</div>
    </div>
    <a href="polizas_motopro.html" class="link-pol">🧾 Pólizas COI</a>
  </div>
</header>

<div class="wrap">

  <div id="avisoConfig" class="config hidden">⚠️ Falta pegar la liga del backend (API_URL). Avísale a Aldo.</div>

  <section>
    <div class="card">
      <div class="pend-head">
        <div>
          <div class="eyebrow" style="margin:0">Fichas de depósito pendientes</div>
          <div class="pend-sub">Para el depósito que hiciste al día siguiente</div>
        </div>
        <button class="btn-sec" id="btnCargarPend">Buscar</button>
      </div>
      <div id="listaPend"></div>
    </div>
  </section>

  <section>
    <div class="card">
      <div class="eyebrow"><span class="n">1</span> Cargar corte de SAIT</div>
      <label class="drop" tabindex="0">
        <input type="file" id="fileSait" accept=".xlsx,.xls">
        <div class="ic">⬆</div>
        <b>Subir movimientos de caja</b>
        <small>Un día o varios — la app los separa solos</small>
      </label>
    </div>
  </section>

  <section id="secLista" class="hidden">
    <div class="card">
      <div class="lista-head">
        <div class="t" id="listaTitulo">Días detectados</div>
        <div class="s" id="listaTotal"></div>
      </div>
      <div id="listaCortes"></div>
    </div>
  </section>

  <section id="secCaptura" class="hidden">
    <div class="card">
      <div class="eyebrow"><span class="n">2</span> ¿Quién captura?</div>
      <div class="field"><input type="text" id="capturadoPor" placeholder="Tu nombre (ej. Marisol)"></div>
    </div>
  </section>

  <section id="secFacturas" class="hidden">
    <div class="card">
      <div class="eyebrow"><span class="n">3</span> Revisar facturación</div>
      <label class="drop sm" tabindex="0" style="padding:18px 16px">
        <input type="file" id="fileFacturas" accept=".xlsx,.xls">
        <div class="ic" style="font-size:22px">🧾</div>
        <b>Subir facturas de SAIT</b>
        <small>Revisa que cada tarjeta y transferencia esté facturada</small>
      </label>
      <div id="resumenFact" class="hidden" style="margin-top:14px"></div>
    </div>
  </section>

  <div class="footnote" id="foot"></div>
</div>

<div class="savebar hidden" id="savebar">
  <div class="wrap">
    <button class="savebtn" id="btnGuardar">Guardar</button>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbz7WxtZQyAJabvuLeqprEOSlbeurweuhxq_h9HXGtv7wxkggm9QpvJQgWFmSty1u-cWVQ/exec";

const $ = id => document.getElementById(id);
let cortes=[], facturas=null, abiertos=new Set();
const fmt = n => '$' + (n||0).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});

if(!API_URL) $('avisoConfig').classList.remove('hidden');

// ---- Fichas de depósito pendientes ----
$('btnCargarPend').addEventListener('click', cargarPendientes);

async function cargarPendientes(){
  const cont=$('listaPend'), btn=$('btnCargarPend');
  btn.textContent='Buscando…'; btn.disabled=true;
  try{
    const res=await fetch(API_URL+'?action=obtener_cortes');
    const data=await res.json();
    const sinFicha=(data.cortes||[]).filter(c=>!String(c.ficha_deposito||'').trim() || String(c.ficha_deposito).startsWith('ERROR'));
    sinFicha.sort((a,b)=>String(b.fecha).localeCompare(String(a.fecha)));
    if(!sinFicha.length){ cont.innerHTML='<div class="pend-empty">✓ Todos los cortes ya tienen su ficha.</div>'; }
    else {
      cont.innerHTML='';
      sinFicha.slice(0,15).forEach(c=>{
        const it=document.createElement('div'); it.className='pend-item';
        it.innerHTML='<div class="pi-info"><b>'+(c.fecha||'')+'</b><span>Corte '+c.id_corte+' · depósito '+fmt(Number(c.deposito_efectivo)||0)+'</span></div>'+
                     '<button class="pi-btn">📷 Subir ficha</button>';
        it.querySelector('.pi-btn').onclick=()=>subirFichaPendiente(c, it);
        cont.appendChild(it);
      });
    }
  }catch(err){ cont.innerHTML='<div class="pend-empty">No se pudo conectar. Revisa tu internet e intenta de nuevo.</div>'; }
  btn.textContent='Buscar'; btn.disabled=false;
}

function subirFichaPendiente(c, item){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.capture='environment';
  inp.onchange=e=>{ const f=e.target.files[0]; if(!f) return;
    comprimirFoto(f, async d=>{
      const btn=item.querySelector('.pi-btn'); btn.textContent='Subiendo…'; btn.disabled=true;
      try{
        const res=await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'agregar_ficha', id_corte:c.id_corte, ficha_b64:d})});
        const data=await res.json();
        if(data.ok){ item.innerHTML='<div class="pi-info"><b>'+(c.fecha||'')+'</b><span style="color:var(--green)">✓ Ficha subida</span></div>'; }
        else { btn.textContent='Reintentar'; btn.disabled=false; alert('No se pudo guardar: '+(data.error||'')); }
      }catch(err){ btn.textContent='Reintentar'; btn.disabled=false; alert('Error de conexión.'); }
    });
  };
  inp.click();
}

function serialToFecha(s){
  if(typeof s !== 'number') return String(s||'').trim();
  const d = new Date(Date.UTC(1899,11,30) + Math.round(s)*86400000);
  const txt = d.toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long',year:'numeric',timeZone:'UTC'});
  return txt.charAt(0).toUpperCase()+txt.slice(1);
}
function fechaISO(s){
  if(typeof s !== 'number') return String(s||'').trim();
  const d = new Date(Date.UTC(1899,11,30) + Math.round(s)*86400000);
  return d.toISOString().slice(0,10);
}
function clasifica(t){ t=String(t||'').trim().toUpperCase(); return ['EF','TC','TD','TR','FONDO'].includes(t)?t:(t||'OTRO'); }

$('fileSait').addEventListener('change', e=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{ try{ parseSait(ev.target.result); }catch(err){ alert('No pude leer ese archivo. Revisa que sea el Excel de movimientos de SAIT.'); console.error(err);} };
  r.readAsArrayBuffer(f);
});

function parseSait(buf){
  const wb=XLSX.read(new Uint8Array(buf),{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:''});
  let hi=rows.findIndex(r=>r.some(c=>String(c).trim().toLowerCase()==='folio'));
  if(hi<0) throw new Error('sin header');
  const h=rows[hi].map(c=>String(c).trim().toLowerCase());
  const ix=n=>h.indexOf(n);
  const iF=ix('folio'),iFe=ix('fecha'),iH=ix('hora'),iC=ix('corte'),iT=ix('tipo'),iCl=ix('cliente'),iI=ix('importe');
  const data=rows.slice(hi+1).filter(r=>r.length && String(r[iF]).trim()!=='');

  const grupos={};
  data.forEach(r=>{
    const lote=String(r[iC]||'').trim() || 'SIN_CORTE';
    const cat=clasifica(r[iT]);
    if(!grupos[lote]) grupos[lote]={lote, fechaRaw:null, ventas:[], totEF:0,totTD:0,totTC:0,totTR:0,totOtro:0};
    const g=grupos[lote];
    if(g.fechaRaw===null) g.fechaRaw=r[iFe];
    if(cat==='FONDO') return;
    const monto=Number(r[iI])||0;
    const v={folio:String(r[iF]).trim(),hora:String(r[iH]||'').trim(),lote,cat,cliente:String(r[iCl]||'').trim()||'Cliente mostrador',monto,voucher:null};
    g.ventas.push(v);
    if(cat==='EF') g.totEF+=monto; else if(cat==='TD') g.totTD+=monto; else if(cat==='TC') g.totTC+=monto; else if(cat==='TR') g.totTR+=monto; else g.totOtro+=monto;
  });

  cortes=Object.values(grupos).map(g=>({
    lote:g.lote, fecha:serialToFecha(g.fechaRaw), fechaISO:fechaISO(g.fechaRaw),
    ventas:g.ventas, tarjeta:g.ventas.filter(v=>v.cat==='TC'||v.cat==='TD'), extras:[],
    pct_desc:20, efvo_facturado:0, ficha:null,
    totEF:g.totEF,totTD:g.totTD,totTC:g.totTC,totTR:g.totTR,totOtro:g.totOtro,
    total:g.totEF+g.totTD+g.totTC+g.totTR+g.totOtro
  }));
  cortes.sort((a,b)=>a.fechaISO.localeCompare(b.fechaISO));
  render();
}

function render(){
  const cont=$('listaCortes'); cont.innerHTML='';
  const n=cortes.length;
  const totalGral=cortes.reduce((s,c)=>s+c.total,0);
  $('listaTitulo').textContent = n===1 ? '1 día detectado' : n+' días detectados';
  $('listaTotal').textContent = 'Total ' + fmt(totalGral);

  if(n===1) abiertos.add(cortes[0].lote);

  cortes.forEach((c,idx)=>{
    const wrap=document.createElement('div'); wrap.className='corte'+(c.tarjeta.length?' tiene-tarjeta':'');
    const row=document.createElement('div'); row.className='crow';
    const mid=document.createElement('div'); mid.className='cmid';
    mid.innerHTML='<div class="l1">'+c.fecha+'</div><div class="l2">Corte '+c.lote+' · '+c.ventas.length+' ventas</div>';
    const tot=document.createElement('div'); tot.className='ctot';
    let badge='';
    if(c.extras.length>0) badge='<div class="vbadge pend">⚠ '+c.extras.length+' de más</div>';
    else if(c.tarjeta.length===0) badge='<div class="vbadge none">sin tarjeta</div>';
    else { const conV=c.tarjeta.filter(v=>v.voucher).length;
      badge='<div class="vbadge '+(conV===c.tarjeta.length?'done':'pend')+'">'+conV+'/'+c.tarjeta.length+' vouchers</div>'; }
    tot.innerHTML='<div class="t num">'+fmt(c.total)+'</div>'+badge;
    const chev=document.createElement('div'); chev.className='chev'; chev.textContent='▸';
    row.append(mid,tot,chev);

    const det=document.createElement('div'); det.className='cdet';
    const abierto=abiertos.has(c.lote);
    if(abierto){ det.classList.add('open'); chev.textContent='▾'; }
    row.onclick=()=>{ if(abiertos.has(c.lote)) abiertos.delete(c.lote); else abiertos.add(c.lote); render(); };
    llenarDet(det,c);
    wrap.append(row,det);
    cont.appendChild(wrap);
  });

  ['secLista','secCaptura','secFacturas'].forEach(s=>$(s).classList.remove('hidden'));
  if(facturas) revisarFacturacion();
  $('savebar').classList.remove('hidden');
  resetBtn();
}

function llenarDet(det,c){
  let chips='<div class="breakdown">';
  chips+='<span class="chip ef">EF '+fmt(c.totEF)+'</span>';
  if(c.totTD) chips+='<span class="chip td">TD '+fmt(c.totTD)+'</span>';
  if(c.totTC) chips+='<span class="chip tc">TC '+fmt(c.totTC)+'</span>';
  if(c.totTR) chips+='<span class="chip">Transf '+fmt(c.totTR)+'</span>';
  if(c.totOtro) chips+='<span class="chip">Otros '+fmt(c.totOtro)+'</span>';
  chips+='</div>';
  det.innerHTML=chips;
  if(c.tarjeta.length>0) c.tarjeta.forEach(v=>det.appendChild(ventaRow(v,c)));
  else det.innerHTML+='<div class="empty">Sin ventas con tarjeta en SAIT.</div>';
  det.appendChild(cotejoVouchers(c,det));
  det.appendChild(depositoEfectivo(c));
  det.appendChild(fichaDeposito(c));
}

function fichaDeposito(c){
  const box=document.createElement('div'); box.className='ficha';
  box.innerHTML='<div class="dep-head">Ficha de depósito</div>';
  if(c.ficha){
    box.innerHTML+='<div class="ficha-ok"><img class="thumb" src="'+c.ficha+'"><span>Ficha lista</span><button class="x">✕</button></div>';
    box.querySelector('.x').onclick=ev=>{ ev.stopPropagation(); c.ficha=null; render(); };
  } else {
    box.innerHTML+='<button class="vbtn ficha-add">🧾 Subir foto de la ficha</button>';
    box.querySelector('.ficha-add').onclick=ev=>{ ev.stopPropagation(); pickFicha(c); };
  }
  return box;
}

function pickFicha(c){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.capture='environment';
  inp.onchange=e=>{ const f=e.target.files[0]; if(!f) return; comprimirFoto(f, d=>{ c.ficha=d; render(); }); };
  inp.click();
}

function calcDeposito(c){
  const pg = Math.max(0, c.totEF - (Number(c.efvo_facturado)||0));
  const pct = (Number(c.pct_desc)||0)/100;
  const exc = pg*pct;
  const dep = pg*(1-pct) + (Number(c.efvo_facturado)||0);
  c.deposito_efectivo = Math.round(dep*100)/100;
  c.excedente_efvo = Math.round(exc*100)/100;
  return {dep:c.deposito_efectivo, exc:c.excedente_efvo};
}

function depositoEfectivo(c){
  const box=document.createElement('div'); box.className='deposito';
  const r=calcDeposito(c);
  box.innerHTML=
    '<div class="dep-head">Depósito en efectivo</div>'+
    '<div class="dep-line"><span>Efectivo del corte</span><b class="num">'+fmt(c.totEF)+'</b></div>'+
    '<div class="dep-fields">'+
      '<label>% descuento<div class="dep-inp"><input type="number" class="i-pct" value="'+c.pct_desc+'" step="1" inputmode="decimal"><span>%</span></div></label>'+
      '<label>Efvo. facturado a cliente<div class="dep-inp"><span>$</span><input type="number" class="i-efvo" value="'+(c.efvo_facturado||'')+'" placeholder="0.00" step="0.01" inputmode="decimal"></div></label>'+
    '</div>'+
    '<div class="dep-result">'+
      '<div class="dep-dep"><span>A depositar</span><b class="num">'+fmt(r.dep)+'</b></div>'+
      '<div class="dep-exc"><span>Excedente</span><b class="num">'+fmt(r.exc)+'</b></div>'+
    '</div>';
  const ipct=box.querySelector('.i-pct'), iefvo=box.querySelector('.i-efvo');
  const upd=()=>{ c.pct_desc=Number(ipct.value)||0; c.efvo_facturado=Number(iefvo.value)||0;
    const rr=calcDeposito(c);
    box.querySelector('.dep-dep b').textContent=fmt(rr.dep);
    box.querySelector('.dep-exc b').textContent=fmt(rr.exc); };
  ipct.oninput=upd; iefvo.oninput=upd;
  [ipct,iefvo].forEach(i=>i.onclick=ev=>ev.stopPropagation());
  return box;
}

function cotejoVouchers(c,det){
  const box=document.createElement('div'); box.className='cotejo';
  const conV=c.tarjeta.filter(v=>v.voucher).length;
  const totalVouchers=conV+c.extras.length;

  let estado='';
  if(c.extras.length>0)
    estado='<div class="cot-bad">⚠️ '+c.extras.length+' voucher(s) de más — esos pagos con tarjeta quedaron como EFECTIVO en SAIT. Hay que corregirlos.</div>';
  else if(c.tarjeta.length>0 && conV===c.tarjeta.length)
    estado='<div class="cot-ok">✓ Cuadra: '+totalVouchers+' voucher(s) para '+c.tarjeta.length+' venta(s) con tarjeta.</div>';
  else if(c.tarjeta.length>0)
    estado='<div class="cot-wait">Faltan '+(c.tarjeta.length-conV)+' voucher(s) por subir de las tarjetas registradas.</div>';

  let extrasHtml='';
  c.extras.forEach((e,i)=>{
    extrasHtml+='<div class="extra-item"><img class="thumb" src="'+e.voucher+'"><span>Voucher sin venta de tarjeta</span><button class="x" data-i="'+i+'">✕</button></div>';
  });

  box.innerHTML=
    '<div class="cot-head">Cotejo de vouchers del día</div>'+
    '<div class="cot-count">Tarjetas en SAIT: <b>'+c.tarjeta.length+'</b> · Vouchers: <b>'+totalVouchers+'</b></div>'+
    estado+ extrasHtml+
    '<button class="vbtn cot-add">📷 Voucher que quedó como efectivo</button>';

  box.querySelector('.cot-add').onclick=ev=>{ ev.stopPropagation(); pickVoucherExtra(c); };
  box.querySelectorAll('.x').forEach(b=>b.onclick=ev=>{ ev.stopPropagation(); c.extras.splice(Number(b.dataset.i),1); render(); });
  return box;
}

function pickVoucherExtra(c){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.capture='environment';
  inp.onchange=e=>{ const f=e.target.files[0]; if(!f) return; comprimirFoto(f, d=>{ c.extras.push({voucher:d}); render(); }); };
  inp.click();
}

function ventaRow(v,c){
  const row=document.createElement('div'); row.className='venta';
  const tg=document.createElement('div'); tg.className='tag '+(v.cat==='TC'?'tc':'td'); tg.textContent=v.cat;
  row.appendChild(tg);
  const info=document.createElement('div'); info.className='info';
  info.innerHTML='<div class="monto num">'+fmt(v.monto)+'</div><div class="meta">#'+v.folio+' · '+v.hora+'</div>';
  row.appendChild(info);
  if(v.voucher){
    const img=document.createElement('img'); img.className='thumb'; img.src=v.voucher; img.title='Tocar para reemplazar';
    img.onclick=ev=>{ev.stopPropagation(); pickVoucher(v);}; row.appendChild(img);
  } else {
    const btn=document.createElement('button'); btn.className='vbtn'; btn.innerHTML='📷 Voucher';
    btn.onclick=ev=>{ev.stopPropagation(); pickVoucher(v);}; row.appendChild(btn);
  }
  return row;
}

function pickVoucher(v){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.capture='environment';
  inp.onchange=e=>{ const f=e.target.files[0]; if(!f) return; comprimirFoto(f, d=>{ v.voucher=d; render(); }); };
  inp.click();
}

function comprimirFoto(file, cb){
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height; const max=1280;
      if(w>h && w>max){ h=Math.round(h*max/w); w=max; }
      else if(h>=w && h>max){ w=Math.round(w*max/h); h=max; }
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      let q=0.7,out=c.toDataURL('image/jpeg',q);
      while(out.length>270000 && q>0.4){ q-=0.1; out=c.toDataURL('image/jpeg',q); }
      cb(out);
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

// ---- Revisar facturación ----
$('fileFacturas').addEventListener('change', e=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{ try{ parseFacturas(ev.target.result); }catch(err){ alert('No pude leer el archivo de facturas. Revisa que sea la Consulta de Facturas de SAIT.'); console.error(err); } };
  r.readAsArrayBuffer(f);
});

function parseFacturas(buf){
  const wb=XLSX.read(new Uint8Array(buf),{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:''});
  let hi=rows.findIndex(r=>r.some(c=>String(c).trim().toLowerCase()==='folio'));
  if(hi<0) throw new Error('sin header facturas');
  const h=rows[hi].map(c=>String(c).trim().toLowerCase());
  const ix=n=>h.indexOf(n);
  const iFolio=ix('folio'), iTotal=ix('total');
  facturas = rows.slice(hi+1)
    .filter(r=> r.length && (Number(r[iTotal])||0) > 0)
    .map(r=>({ folio:String(r[iFolio]||'').trim(), total:Number(r[iTotal])||0, usada:false }));
  revisarFacturacion();
}

function buscarFactura(monto){
  const f=facturas.find(x=>!x.usada && Math.abs(x.total-monto)<=0.01);
  if(f){ f.usada=true; return true; }
  return false;
}

function revisarFacturacion(){
  if(!facturas) return;
  facturas.forEach(f=>f.usada=false);
  let total=0; const faltan=[];
  cortes.forEach(c=>{
    c.ventas.filter(v=>['TD','TC','TR'].includes(v.cat)).forEach(v=>{
      total++;
      if(!buscarFactura(v.monto)) faltan.push({fecha:c.fecha, cat:v.cat, monto:v.monto, folio:v.folio});
    });
  });
  const el=$('resumenFact'); el.classList.remove('hidden');
  if(faltan.length===0){
    el.innerHTML='<div class="fact-ok">✓ Todo facturado — las '+total+' ventas con tarjeta y transferencia tienen su factura.</div>';
    return;
  }
  let html='<div class="fact-bad">⚠️ Faltan '+faltan.length+' por facturar</div><div class="fact-lista">';
  faltan.forEach(f=>{
    const nom=f.cat==='TD'?'Débito':(f.cat==='TC'?'Crédito':'Transferencia');
    html+='<div class="fact-item"><span>'+f.fecha+' · '+nom+' · #'+f.folio+'</span><b class="num">'+fmt(f.monto)+'</b></div>';
  });
  el.innerHTML=html+'</div>';
}

function resetBtn(){ const b=$('btnGuardar'); b.disabled=false; b.classList.remove('ok'); b.textContent='Guardar '+(cortes.length>1?cortes.length+' cortes':'corte'); }

$('btnGuardar').addEventListener('click', async ()=>{
  if(!cortes.length) return;
  if(!API_URL){ alert('Falta configurar la liga del backend.'); return; }
  const nombre=$('capturadoPor').value.trim();
  const b=$('btnGuardar'); b.disabled=true;
  let ok=0; const fail=[];
  for(let i=0;i<cortes.length;i++){
    const c=cortes[i];
    calcDeposito(c);
    b.textContent='Guardando '+(i+1)+'/'+cortes.length+'…';
    const payload={
      action:'guardar_corte',
      corte:{ id_corte:c.lote, fecha:c.fechaISO, sucursal:'Moto Pro',
              efectivo:c.totEF, debito:c.totTD, credito:c.totTC, transferencia:c.totTR, total:c.total, capturado_por:nombre,
              pct_desc:c.pct_desc, efvo_facturado:c.efvo_facturado, deposito_efectivo:c.deposito_efectivo, excedente_efvo:c.excedente_efvo, ficha_b64:c.ficha||'' },
      ventas:c.ventas.map(v=>({ folio:v.folio, hora:v.hora, tipo:v.cat, cliente:v.cliente, monto:v.monto, voucherB64:v.voucher||'' }))
        .concat(c.extras.map((e,i)=>({ folio:'EXTRA'+(i+1), hora:'', tipo:'EXTRA', cliente:'Voucher sin venta de tarjeta (revisar SAIT)', monto:0, voucherB64:e.voucher })))
    };
    try{ const res=await fetch(API_URL,{method:'POST',body:JSON.stringify(payload)}); const data=await res.json(); data.ok?ok++:fail.push(c.lote); }
    catch(err){ fail.push(c.lote); console.error(err); }
  }
  if(fail.length===0){ b.classList.add('ok'); b.textContent='✓ Guardado ('+ok+')'; $('foot').textContent='Se guardaron '+ok+' corte(s) correctamente.'; }
  else { b.disabled=false; b.textContent='Reintentar'; $('foot').textContent='Guardados: '+ok+'. Fallaron: '+fail.join(', ')+'. Revisa tu señal e inténtalo de nuevo.'; }
});
</script>
